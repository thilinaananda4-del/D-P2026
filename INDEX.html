<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>මහින්දාගමනය කතා පුවත</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@400;600;700;800&family=Yaldevi:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Yaldevi', 'Noto Serif Sinhala', serif;
    user-select: none;
    -webkit-user-select: none;
  }

  body { -webkit-touch-callout: none; }

  #snow-canvas {
    position: fixed; inset: 0; z-index: 500; pointer-events: none;
  }

  /* ===== LOADER ===== */
  #loader {
    position: fixed; inset: 0; z-index: 1000;
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(14px,3vh,28px);
    padding: 16px;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #loader.hide { opacity: 0; visibility: hidden; }

  .chakra-wrap { width: clamp(70px,18vw,180px); height: clamp(70px,18vw,180px); flex-shrink: 0; }
  .chakra-wrap img {
    width: 100%; height: 100%; object-fit: contain;
    animation: chakraSpin 3s linear infinite;
    filter: drop-shadow(0 0 18px rgba(255,140,0,0.85));
  }
  @keyframes chakraSpin { to { transform: rotate(360deg); } }

  .loader-msg {
    font-size: clamp(14px,4vw,28px);
    color: #FFD700;
    min-height: 1.6em;
    max-height: 42vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
    text-align: center;
    padding: 0 16px;
    width: 100%;
    max-width: 640px;
    letter-spacing: 0.5px;
    font-family: 'Yaldevi', 'Noto Serif Sinhala', serif;
    font-weight: 600;
    text-shadow: 0 0 12px rgba(255,215,0,0.5);
    line-height: 1.6;
  }
  .loader-msg::-webkit-scrollbar { display: none; width: 0; height: 0; background: transparent; }
  .loader-msg .msg-line { display: block; word-break: break-word; }
  .loader-msg .msg-line + .msg-line { margin-top: 6px; }
  .cursor {
    display: inline-block; width: 2px; height: 1em;
    background: #FFD700; margin-left: 3px; vertical-align: middle;
    animation: blink 0.6s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .progress-wrap {
    width: clamp(200px,60vw,400px); height: 3px;
    background: rgba(255,165,0,0.15); border-radius: 4px; overflow: hidden;
  }
  .progress-bar { height: 100%; width: 0%; background: linear-gradient(to right,#FF8C00,#FFD700,#FF8C00); border-radius: 4px; }

  #enter-btn {
    display: none;
    padding: clamp(12px,3vw,16px) clamp(32px,8vw,64px);
    font-size: clamp(15px,3.5vw,22px);
    font-family: 'Yaldevi', 'Noto Serif Sinhala', serif;
    background: linear-gradient(135deg,#7B3F00,#B8860B,#FFD700,#B8860B,#7B3F00);
    background-size: 200% auto; color: #000; border: none; border-radius: 50px;
    cursor: pointer; font-weight: bold; letter-spacing: 2px;
    animation: bgShift 3s linear infinite; transition: transform 0.2s;
  }
  #enter-btn:hover { transform: scale(1.07); }
  @keyframes bgShift { from{background-position:0% center} to{background-position:200% center} }

  /* ===== MAIN ===== */
  #main { display: none; position: fixed; inset: 0; }
  #thorana { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  #thorana img { width: 100%; height: 100%; object-fit: contain; display: block; }

  .branch-top { position: absolute; top: 0; left: 0; width: 100%; z-index: 10; pointer-events: none; }
  .branch-top img { width: 100%; height: auto; display: block; }

  .plant { position: absolute; bottom: 0; pointer-events: none; }
  .plant img { width: 100%; height: auto; display: block; }
  .plant-left-1  { left: 0; width: clamp(80px,16vw,220px); z-index: 10; }
  .plant-left-2  { left: clamp(60px,12vw,170px); width: clamp(60px,12vw,165px); z-index: 9; transform: scale(0.75); transform-origin: bottom left; }
  .plant-right-1 { right: 0; width: clamp(80px,16vw,220px); z-index: 10; transform: scaleX(-1); transform-origin: bottom right; }
  .plant-right-2 { right: clamp(60px,12vw,170px); width: clamp(60px,12vw,165px); z-index: 9; transform: scaleX(-1) scale(0.75); transform-origin: bottom right; }

  /* ===== SOCIAL BAR ===== */
  #social-bar {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    display: none;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 8px;
    width: calc(100% - 24px);
    max-width: 480px;
    padding: 0 4px;
  }

  .social-link {
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    padding: 7px 14px;
    border: 1.5px solid rgba(255,215,0,0.5);
    border-radius: 50px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    color: #fff;
    font-size: clamp(11px,3vw,13px);
    font-family: 'Yaldevi', sans-serif;
    font-weight: 500;
    letter-spacing: 0.3px;
    white-space: nowrap;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .social-link.fb-link:hover, .social-link.fb-link:active {
    transform: scale(1.08);
    border-color: #1877F2;
    box-shadow: 0 0 10px rgba(24,119,242,0.7), 0 0 25px rgba(24,119,242,0.45), 0 0 45px rgba(24,119,242,0.25);
  }
  .social-link.tt-link:hover, .social-link.tt-link:active {
    transform: scale(1.08);
    border-color: #ffffff;
    box-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 25px rgba(255,255,255,0.5), 0 0 45px rgba(200,200,255,0.3);
  }
  .social-link.wa-link:hover, .social-link.wa-link:active {
    transform: scale(1.08);
    border-color: #25D366;
    box-shadow: 0 0 10px rgba(37,211,102,0.7), 0 0 25px rgba(37,211,102,0.45), 0 0 45px rgba(37,211,102,0.25);
  }

  .social-icon {
    width: 22px; height: 22px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .social-icon.fb { background: #1877F2; }
  .social-icon.tt { background: #000; border: 1px solid #444; }
  .social-icon.wa { background: #25D366; }

  /* ===== COPYRIGHT ===== */
  #copyright {
    position: fixed;
    bottom: 7px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 997;
    display: none;
    color: rgba(255,215,0,0.5);
    font-size: clamp(9px,1.8vw,11px);
    font-family: 'Yaldevi', 'Noto Serif Sinhala', serif;
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.8px;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(255,215,0,0.2);
  }

  /* ===== MUSIC BTN ===== */
  #music-btn {
    position: fixed; bottom: 18px; right: 16px; z-index: 999;
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(0,0,0,0.55);
    border: 2px solid rgba(255,215,0,0.6);
    color: #FFD700; font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }

  /* ===== MOBILE / SMALL SCREEN ADJUSTMENTS ===== */
  @media (max-width: 480px) {
    .loader-msg { max-height: 38vh; padding: 0 10px; }
    .progress-wrap { width: clamp(160px,70vw,400px); }
    #enter-btn { padding: 12px 28px; font-size: 15px; }
    #social-bar { bottom: 22px; gap: 6px; }
    .social-link { padding: 6px 12px; gap: 5px; }
    .social-icon { width: 18px; height: 18px; }
    #music-btn { bottom: 14px; right: 12px; width: 40px; height: 40px; font-size: 18px; }
    #copyright { bottom: 4px; font-size: 9px; }
  }

  @media (max-height: 600px) {
    #loader { gap: 10px; padding: 10px; }
    .chakra-wrap { width: clamp(56px,16vh,90px); height: clamp(56px,16vh,90px); }
    .loader-msg { max-height: 34vh; font-size: clamp(13px,3.6vw,20px); }
  }

  @media (max-width: 360px) {
    #social-bar { flex-direction: column; bottom: 70px; gap: 6px; }
  }
</style>
</head>
<body>

<canvas id="snow-canvas"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="chakra-wrap">
    <img src="Dharmachakra_Buddhism_Buddhist_Symbolism_Hinduism_PNG-removebg-preview.png" alt="ධර්මචක්‍රය">
  </div>
  <div class="loader-msg"><span id="type-text"></span><span class="cursor"></span></div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <button id="enter-btn" onclick="enterSite()">තොරණ බලන්න</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="thorana"><img src="POSON4.gif" alt="තොරණ"></div>
  <div class="branch-top"><img src="download__26_-removebg-preview.png" alt=""></div>
  <div class="plant plant-left-1"><img src="download__1_-removebg-preview.png" alt=""></div>
  <div class="plant plant-left-2"><img src="download__1_-removebg-preview.png" alt=""></div>
  <div class="plant plant-right-1"><img src="download__1_-removebg-preview.png" alt=""></div>
  <div class="plant plant-right-2"><img src="download__1_-removebg-preview.png" alt=""></div>
  <button id="music-btn">🎵</button>
</div>

<!-- SOCIAL BAR -->
<div id="social-bar">
  <a class="social-link fb-link" href="https://www.facebook.com/profile.php?id=61552332803796" target="_blank" rel="noopener">
    <div class="social-icon fb">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
    </div>
    Facebook
  </a>
  <a class="social-link tt-link" href="https://www.tiktok.com/@dark_sudhdha" target="_blank" rel="noopener">
    <div class="social-icon tt">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.75a4.85 4.85 0 0 1-1.01-.06z"/></svg>
    </div>
    TikTok
  </a>
  <a class="social-link wa-link" href="https://wa.me/94717472209" target="_blank" rel="noopener">
    <div class="social-icon wa">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M11.999 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.948-1.42A9.956 9.956 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.952 7.952 0 0 1-4.078-1.123l-.292-.173-3.034.872.838-3.141-.19-.305A7.948 7.948 0 0 1 4 12c0-4.418 3.582-8 8-8s8 3.582 8 8-3.582 8-8 8z"/></svg>
    </div>

</div>

<!-- COPYRIGHT -->
<div id="copyright">© 2026 Thilina Ananda · සියලු හිමිකම් ඇවිරිණි</div>

<audio id="bg-audio" loop>
  <source src="VIRIDU.mp3" type="audio/mpeg">
</audio>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());

  /* ===== SNOW ===== */
  const canvas = document.getElementById('snow-canvas');
  const ctx = canvas.getContext('2d');
  let flakes = [];

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function createFlake() {
    return { x: Math.random()*canvas.width, y:-10, r: Math.random()*4+1.5,
             speed: Math.random()*1.2+0.4, drift: Math.random()*0.6-0.3, opacity: Math.random()*0.6+0.3 };
  }
  for (let i=0;i<120;i++) flakes.push({...createFlake(), y:Math.random()*canvas.height});

  function drawSnow() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    flakes.forEach(f=>{
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${f.opacity})`; ctx.fill();
      f.y+=f.speed; f.x+=f.drift;
      if(f.y>canvas.height+10) Object.assign(f,createFlake());
    });
    requestAnimationFrame(drawSnow);
  }
  drawSnow();

  /* ===== TYPEWRITER ===== */
  const messages = ["ලක් දෙරණ ධර්මයෙන් ඒකාලෝක කළ, පින්බර පොසොන් පෝය දිනයක් වේවා!","මහින්දාගමනය කතා පුවත රැගත් ඩිජිටල් තොරණ දැකබලා ඔබත් පිං සිත් පහදවා ගනිත්වා..","විරිදු සුරල්වල අයිතිය මුල් හිමිකරුවන් සතුවේ.","අඩුපාඩු වෙතොත් සමාවෙන්න...","ඔබගේ අදහස් මාහට යොමු කරන්න.","ස්තූතිය - සහය දුන් සැමට!"];
  let mIdx=0, cIdx=0;
  const el=document.getElementById('type-text');
  const bar=document.getElementById('progress-bar');
  const btn=document.getElementById('enter-btn');
  let prog=0;
  const pi=setInterval(()=>{ if(prog<98){prog+=0.4; bar.style.width=prog+'%';} },40);

  function typeNext() {
    if(mIdx>=messages.length){
      clearInterval(pi); bar.style.transition='width 0.4s ease'; bar.style.width='100%';
      setTimeout(()=>{ btn.style.display='block'; },500); return;
    }
    const msg=messages[mIdx];
    let lineEl=document.getElementById('msg-line-'+mIdx);
    if(!lineEl){
      lineEl=document.createElement('span');
      lineEl.className='msg-line';
      lineEl.id='msg-line-'+mIdx;
      el.appendChild(lineEl);
    }
    if(cIdx<msg.length){ lineEl.textContent+=msg[cIdx++]; setTimeout(typeNext,75); }
    else { mIdx++; cIdx=0; setTimeout(()=>{ typeNext(); },600); }
  }
  typeNext();

  /* ===== ENTER ===== */
  function enterSite() {
    document.getElementById('loader').classList.add('hide');
    setTimeout(()=>{
      document.getElementById('loader').style.display='none';
      document.getElementById('main').style.display='block';
      document.getElementById('social-bar').style.display='flex';
      document.getElementById('copyright').style.display='block';
      document.getElementById('bg-audio').play().catch(()=>{});
    },800);
  }

  /* ===== MUSIC ===== */
  const audio=document.getElementById('bg-audio');
  const musicBtn=document.getElementById('music-btn');
  musicBtn.addEventListener('click',()=>{
    if(audio.paused){audio.play();musicBtn.textContent='🎵';}
    else{audio.pause();musicBtn.textContent='🔇';}
  });

  /* ===== TOUCH GLOW ===== */
  document.querySelectorAll('.social-link').forEach(link => {
    link.addEventListener('touchstart', () => link.classList.add('touch-active'), { passive: true });
    link.addEventListener('touchend',   () => setTimeout(() => link.classList.remove('touch-active'), 400));
  });
</script>
</body>
</html>
